apiVersion: v1
kind: Secret
metadata:
  name: mongot-monitor-secret
  namespace: mongodb       # change to your namespace
  labels:
    app: mongot-monitor
type: Opaque
stringData:
  # Paste your full MongoDB connection string here.
  # stringData is auto-encoded to base64 by Kubernetes.
  MONGODB_URI: "mongodb://USER:PASSWORD@HOST1:PORT1,HOST2:PORT2/admin?replicaSet=RS&tls=true&tlsAllowInvalidCertificates=true&authSource=admin"
