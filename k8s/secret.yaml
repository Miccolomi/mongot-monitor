apiVersion: v1
kind: Secret
metadata:
  name: mongot-monitor-secret
  namespace: mongodb       # change to your namespace
  labels:
    app: mongot-monitor
type: Opaque
stringData:
  # MongoDB connection string for mongod (required for oplog, index and compliance checks).
  # mongot is always discovered automatically via Kubernetes — no URI needed for it.
  #
  # ── SCENARIO A: mongod is inside the same Kubernetes cluster (installed via MCK) ──
  # Use the internal K8s DNS name of the replica set headless service.
  # Pattern: <replica-set-name>-svc.<namespace>.svc.cluster.local
  # Find it with: kubectl get svc -n <namespace>
  #
  # MONGODB_URI: "mongodb://USER:PASSWORD@my-replica-set-svc.mongodb.svc.cluster.local/admin?replicaSet=my-replica-set&tls=true&tlsAllowInvalidCertificates=true&authSource=admin&authMechanism=SCRAM-SHA-256"
  #
  # ── SCENARIO B: mongod is outside the cluster (Atlas, on-prem, external VM) ──
  # Use the external hostname or SRV string provided by your MongoDB deployment.
  #
  # Atlas:
  # MONGODB_URI: "mongodb+srv://USER:PASSWORD@cluster0.xxxxx.mongodb.net/admin?authSource=admin"
  #
  # External replica set with DNS-resolvable hostnames:
  # MONGODB_URI: "mongodb://USER:PASSWORD@host1:27017,host2:27017,host3:27017/admin?replicaSet=RS&tls=true&authSource=admin&authMechanism=SCRAM-SHA-256"
  #
  # ── Paste your URI below ──
  MONGODB_URI: "mongodb://USER:PASSWORD@HOST/admin?replicaSet=RS&authSource=admin&authMechanism=SCRAM-SHA-256"
